<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plan de feux — Canal 7</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon192.png">
<link rel="apple-touch-icon" href="icon192.png">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Plan de feux">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if (window.pdfjsLib) { pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }</script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:14px;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0ede8;color:#1a1a1a;height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none;}
  .app{display:flex;flex-direction:column;height:100vh;}
  .hdr{height:54px;flex-shrink:0;background:#111;display:flex;align-items:center;gap:10px;padding:0 12px;padding-top:env(safe-area-inset-top);color:#fff;}
  .hdr .back{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:2px 6px;line-height:1;}
  .hdr .logo{font-size:15px;font-weight:700;letter-spacing:-.5px;}
  .hdr .logo span{color:#e84040;}
  .hdr .title{flex:1;min-width:0;font-size:13px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hdr .save{background:#7c3aed;border:none;color:#fff;font-size:13px;font-weight:700;border-radius:9px;padding:8px 14px;cursor:pointer;}
  .toolbar{flex-shrink:0;background:#fff;border-bottom:1px solid #e5e2dc;display:flex;gap:8px;padding:8px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tb-btn{flex-shrink:0;background:#f7f6f3;border:1px solid #e0ddd8;color:#333;font-size:12px;font-weight:600;border-radius:9px;padding:8px 12px;cursor:pointer;white-space:nowrap;}
  .tb-btn.primary{background:#f3f0ff;border-color:#c4b5fd;color:#7c3aed;}
  .tb-btn.on{background:#7c3aed;border-color:#7c3aed;color:#fff;}
  .stage-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;background:#dcd8d2;display:flex;align-items:flex-start;justify-content:center;padding:12px;}
  .stage{position:relative;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.12);max-width:100%;}
  .stage img{display:block;max-width:100%;height:auto;pointer-events:none;-webkit-user-drag:none;}
  .empty{width:100%;max-width:520px;margin:auto;text-align:center;}
  .empty-zone{margin:40px 12px;border:2px dashed #c4b5fd;border-radius:16px;background:#faf8ff;padding:48px 20px;cursor:pointer;color:#7c3aed;}
  .empty-zone .ic{font-size:34px;}
  .empty-zone .t{font-size:15px;font-weight:600;margin-top:10px;}
  .empty-zone .s{font-size:12px;color:#999;margin-top:4px;}

  .pin{position:absolute;transform:translate(-50%,-50%);width:44px;height:44px;z-index:2;touch-action:none;cursor:grab;}
  .pin.sel{z-index:6;}
  .pin.sel::before{content:'';position:absolute;inset:-7px;border:2px dashed #7c3aed;border-radius:12px;}
  .pin-rot{position:absolute;inset:0;}
  .pin-rot svg{width:100%;height:100%;display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
  .pin-num{position:absolute;right:-5px;bottom:-5px;min-width:17px;height:17px;padding:0 3px;border-radius:9px;border:1.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;box-shadow:0 1px 3px rgba(0,0,0,.35);z-index:1;}
  .pin-handle{position:absolute;left:50%;top:50%;width:0;height:0;}
  .pin-handle-line{position:absolute;left:-1px;top:-36px;width:2px;height:36px;background:#7c3aed;}
  .pin-handle-knob{position:absolute;left:-13px;top:-49px;width:26px;height:26px;border-radius:50%;background:#7c3aed;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45);touch-action:none;cursor:grab;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;}

  .hint{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#7c3aed;color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:50;}
  .chip{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#111;color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:22px;box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:50;cursor:pointer;display:none;}
  .chip.show{display:block;}

  .sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;z-index:60;}
  .sheet-ov.open{display:flex;}
  .sheet{width:100%;background:#f7f6f3;border-radius:18px 18px 0 0;padding:14px 16px calc(16px + env(safe-area-inset-bottom));max-height:84vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .sheet h3{font-size:15px;font-weight:700;color:#7c3aed;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .sheet h3 button{background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;}
  .fld{margin-bottom:10px;}
  .fld label{display:block;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .fld input,.fld select{width:100%;padding:10px 12px;border:1px solid #e0ddd8;border-radius:9px;font-size:16px;background:#fff;color:#111;outline:none;}
  .symrow{display:flex;gap:7px;flex-wrap:wrap;}
  .symbtn{width:48px;height:48px;border-radius:10px;border:1px solid #e0ddd8;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:5px;}
  .symbtn.sel{border-color:#7c3aed;background:#f3f0ff;box-shadow:0 0 0 1px #7c3aed inset;}
  .symbtn svg{width:100%;height:100%;color:#444;}
  .orow{display:flex;align-items:center;gap:10px;}
  .rotbtn{width:42px;height:38px;border-radius:9px;border:1px solid #e0ddd8;background:#fff;font-size:18px;cursor:pointer;color:#7c3aed;}
  .angle-val{font-size:14px;font-weight:700;color:#111;min-width:46px;text-align:center;}
  .colorrow{display:flex;gap:6px;flex-wrap:wrap;}
  .sw{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #ddd;cursor:pointer;}
  .sw.sel{box-shadow:0 0 0 2px #7c3aed;}
  .sheet-actions{display:flex;gap:8px;margin-top:6px;}
  .btn-del{flex:1;padding:12px;border-radius:11px;background:#fff;border:1px solid #e5b4b4;color:#c0392b;font-size:14px;font-weight:600;cursor:pointer;}
  .btn-ok{flex:2;padding:12px;border-radius:11px;background:#7c3aed;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}

  .legend{position:fixed;inset:0;background:#f0ede8;z-index:70;display:none;flex-direction:column;}
  .legend.open{display:flex;}
  .legend .lh{height:54px;flex-shrink:0;background:#111;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;padding-top:env(safe-area-inset-top);}
  .legend .lh .t{font-size:15px;font-weight:700;}
  .legend .lh button{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;}
  .legend .lbody{flex:1;overflow-y:auto;padding:12px;}
  .leg-item{display:flex;align-items:center;gap:11px;background:#fff;border:.5px solid #e5e2dc;border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .leg-sym{width:34px;height:34px;flex-shrink:0;position:relative;}
  .leg-sym svg{width:100%;height:100%;}
  .leg-num{position:absolute;right:-4px;bottom:-4px;min-width:16px;height:16px;padding:0 3px;border-radius:8px;border:1.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;}
  .leg-txt{flex:1;min-width:0;}
  .leg-txt .a{font-size:13px;font-weight:600;color:#111;}
  .leg-txt .b{font-size:11px;color:#888;}
  .leg-empty{text-align:center;color:#aaa;padding:40px 0;font-size:14px;}

  .menu{position:fixed;background:#fff;border:1px solid #e5e2dc;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:6px;z-index:80;display:none;min-width:170px;}
  .menu.open{display:block;}
  .menu button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 12px;font-size:13px;color:#111;border-radius:8px;cursor:pointer;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111;color:#fff;font-size:13px;font-weight:500;padding:10px 18px;border-radius:22px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <button class="back" onclick="goBack()">&#8249;</button>
    <div class="logo">C<span>7</span></div>
    <div class="title" id="title">Plan de feux</div>
    <button class="save" onclick="savePlan()">Enregistrer</button>
  </div>
  <div class="toolbar">
    <button class="tb-btn primary" onclick="document.getElementById('bg-input').click()">&#128506; Importer un plan</button>
    <button class="tb-btn" id="add-btn" onclick="toggleAddMode()">&#65291; Projecteur</button>
    <button class="tb-btn" onclick="openLegend()">&#128203; Légende</button>
    <button class="tb-btn" onclick="openExportMenu(event)">&#11015; Exporter</button>
    <input type="file" id="bg-input" accept="image/*,application/pdf" class="hidden" onchange="onBgFile(this)">
  </div>
  <div class="stage-wrap" id="stage-wrap">
    <div class="empty" id="empty">
      <div class="empty-zone" onclick="document.getElementById('bg-input').click()">
        <div class="ic">&#128507;</div>
        <div class="t">Importer un plan</div>
        <div class="s">Photo ou PDF du décor — puis posez vos projecteurs dessus</div>
      </div>
    </div>
    <div class="stage hidden" id="stage"><img id="bg-img" alt="plan"></div>
  </div>
</div>

<div class="hint hidden" id="hint">Touchez le plan pour poser un projecteur</div>
<div class="chip" id="edit-chip" onclick="editSelected()">&#9998; Éditer ce projecteur</div>

<div class="sheet-ov" id="sheet-ov">
  <div class="sheet">
    <h3><span>Projecteur</span><button onclick="closeSheet()">&times;</button></h3>
    <div class="fld"><label>Type / symbole</label><div class="symrow" id="symrow"></div></div>
    <div class="fld"><label>Orientation du faisceau</label>
      <div class="orow">
        <button class="rotbtn" onclick="nudgeAngle(-15)">&#8634;</button>
        <div class="angle-val" id="angle-val">0&deg;</div>
        <button class="rotbtn" onclick="nudgeAngle(15)">&#8635;</button>
        <span style="font-size:11px;color:#999;margin-left:auto;text-align:right;">…ou tournez la poignée violette sur le plan</span>
      </div>
    </div>
    <div class="fld"><label>N&deg;</label><input id="f-num" type="text" inputmode="numeric"></div>
    <div class="fld"><label>Modèle (texte)</label><input id="f-type" type="text" list="types" placeholder="ex: Joker 800, SkyPanel S60…"><datalist id="types"></datalist></div>
    <div class="fld"><label>Puissance / intensité</label><input id="f-pow" type="text" placeholder="ex: 1.2 kW, 100%"></div>
    <div class="fld"><label>Séquence</label><select id="f-seq"></select></div>
    <div class="fld"><label>Couleur</label><div class="colorrow" id="colorrow"></div></div>
    <div class="sheet-actions">
      <button class="btn-del" onclick="deletePin()">Supprimer</button>
      <button class="btn-ok" onclick="closeSheet()">OK</button>
    </div>
  </div>
</div>

<div class="legend" id="legend">
  <div class="lh"><div class="t">Légende</div><button onclick="closeLegend()">&times;</button></div>
  <div class="lbody" id="legend-body"></div>
</div>

<div class="menu" id="export-menu">
  <button onclick="exportPNG()">Exporter en PNG</button>
  <button onclick="exportPDF()">Exporter en PDF</button>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---------- Symboles de projecteurs (faisceau vers le HAUT) ---------- */
const SYMBOLS = {
  par:      '<polygon points="20,15 5,1 35,1" fill="currentColor" fill-opacity="0.22"/><polygon points="11,15 29,15 26,30 14,30" fill="currentColor"/><rect x="10" y="13" width="20" height="3.4" rx="1.7" fill="currentColor"/>',
  fresnel:  '<polygon points="20,17 6,1 34,1" fill="currentColor" fill-opacity="0.22"/><circle cx="20" cy="25" r="9.5" fill="currentColor"/><circle cx="20" cy="25" r="4.6" fill="#fff" fill-opacity="0.85"/>',
  panel:    '<polygon points="20,18 2,2 38,2" fill="currentColor" fill-opacity="0.18"/><rect x="8" y="18" width="24" height="13" rx="2.5" fill="currentColor"/><rect x="10.5" y="20.5" width="19" height="8" rx="1.5" fill="#fff" fill-opacity="0.7"/>',
  profile:  '<polygon points="20,16 15.5,1 24.5,1" fill="currentColor" fill-opacity="0.3"/><path d="M14,31 L26,31 L23,16 L17,16 Z" fill="currentColor"/><circle cx="20" cy="31" r="4.2" fill="currentColor"/>',
  tube:     '<g fill="currentColor" fill-opacity="0.2"><polygon points="9,22 7,5 15,22"/><polygon points="20,22 18,3 26,22"/><polygon points="31,22 25,5 33,22"/></g><rect x="4" y="22" width="32" height="8.5" rx="4.25" fill="currentColor"/>',
  space:    '<g stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="20" y1="1" x2="20" y2="6"/><line x1="20" y1="34" x2="20" y2="39"/><line x1="1" y1="20" x2="6" y2="20"/><line x1="34" y1="20" x2="39" y2="20"/><line x1="7" y1="7" x2="10.6" y2="10.6"/><line x1="29.4" y1="29.4" x2="33" y2="33"/><line x1="33" y1="7" x2="29.4" y2="10.6"/><line x1="7" y1="33" x2="10.6" y2="29.4"/></g><circle cx="20" cy="20" r="8.5" fill="currentColor"/><circle cx="20" cy="20" r="4" fill="#fff" fill-opacity="0.8"/>',
  practical:'<path d="M20,4 C13.5,4 9,8.5 9,14.5 C9,18.5 11.5,20.5 13,23.5 L27,23.5 C28.5,20.5 31,18.5 31,14.5 C31,8.5 26.5,4 20,4 Z" fill="currentColor"/><rect x="14.5" y="23.5" width="11" height="4.5" rx="1.5" fill="currentColor"/><rect x="16.5" y="28" width="7" height="3.2" rx="1.6" fill="currentColor"/>'
};
const SYMBOL_LIST = [['par','PAR'],['fresnel','Fresnel'],['panel','Panneau'],['profile','Découpe'],['tube','Tube'],['space','Ballon'],['practical','Practical']];
function symbolInner(sym){ return SYMBOLS[sym] || SYMBOLS.par; }
function symbolSvg(sym, color, size){ return '<svg viewBox="0 0 40 40" width="'+(size||40)+'" height="'+(size||40)+'" style="color:'+color+'">'+symbolInner(sym)+'</svg>'; }
function symbolDataUrl(sym, color, size){ const inner=symbolInner(sym).replace(/currentColor/g,color); const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="'+size+'" height="'+size+'">'+inner+'</svg>'; return 'data:image/svg+xml,'+encodeURIComponent(svg); }

const PALETTE = ['#7c3aed','#e84040','#f59e0b','#16a34a','#0ea5e9','#ec4899','#111111','#ffffff'];
const TYPE_SUGGESTIONS = ['Joker 400','Joker 800','Joker 1600','M18','M40','HMI 575','HMI 1200','HMI 2500','SkyPanel S30','SkyPanel S60','SkyPanel S360','Astera Titan','Aputure 600d','Aputure 1200d','Nova P300c','Mandarine 800','Blonde 2 kW','Fresnel 1 kW','Fresnel 2 kW','Tungstène 5 kW','Découpe','Practical','Kino Flo','Tube LED'];

let DECOR_ID=null, FILM_ID=null, DECOR_NAME='', DECOR_SEQS=[];
let state={ bg:null, bgW:0, bgH:0, pins:[] };
let selId=null;

/* ---------- Canal 7 link ---------- */
function qp(k){ return new URLSearchParams(location.search).get(k); }
function readCanal7(){ try { return JSON.parse(localStorage.getItem('ponctuels-state')||'null'); } catch(e){ return null; } }
function seqLabel(s){ const code=(s.num||'')+(s.lettre||''); return code + (s.effet ? (code?' ':'')+s.effet : ''); }
function initContext(){
  DECOR_ID = qp('decor');
  const st = readCanal7();
  if (DECOR_ID && st && Array.isArray(st.d2Items)) {
    const d = st.d2Items.find(function(x){ return String(x.id)===String(DECOR_ID); });
    if (d) { DECOR_NAME=d.nom||'Décor'; FILM_ID=d.filmId||null; DECOR_SEQS=(d.sequences||[]).slice(); }
  }
  document.getElementById('title').textContent = DECOR_NAME ? ('Plan de feux — '+DECOR_NAME) : 'Plan de feux';
  document.getElementById('types').innerHTML = TYPE_SUGGESTIONS.map(function(t){ return '<option value="'+esc(t)+'">'; }).join('');
}
function storeKey(){ return 'planfeux-' + (DECOR_ID||'standalone'); }

// Composite « canvas natif » (pas de SVG → pas de canvas « tainted » sur iOS). Gère l'absence de fond.
function buildCompositeNative(){
  return new Promise(function(resolve){
    function draw(bgImg){
      var W,H,cv,ctx;
      if (bgImg){ W=bgImg.naturalWidth||bgImg.width; H=bgImg.naturalHeight||bgImg.height; if(!W||!H){W=state.bgW||1400;H=state.bgH||1000;} cv=document.createElement('canvas'); cv.width=W; cv.height=H; ctx=cv.getContext('2d'); ctx.drawImage(bgImg,0,0,W,H); }
      else { W=state.bgW||1400; H=state.bgH||1000; cv=document.createElement('canvas'); cv.width=W; cv.height=H; ctx=cv.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H); }
      var size=Math.max(36,Math.round(Math.min(W,H)*0.07));
      (state.pins||[]).forEach(function(p){
        var cx=(p.x||0)*W, cy=(p.y||0)*H, col=p.color||'#e84040';
        ctx.save(); ctx.translate(cx,cy); ctx.rotate((p.angle||0)*Math.PI/180);
        ctx.beginPath(); ctx.moveTo(0,-size*0.5); ctx.lineTo(size*0.42,size*0.34); ctx.lineTo(-size*0.42,size*0.34); ctx.closePath();
        ctx.fillStyle=col; ctx.fill(); ctx.lineWidth=Math.max(1,size*0.03); ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.stroke(); ctx.restore();
        var r=size*0.24, bx=cx+size*0.34, by=cy+size*0.34;
        ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
        ctx.lineWidth=Math.max(1.5,r*0.2); ctx.strokeStyle='#fff'; ctx.stroke();
        ctx.fillStyle=contrast(col); ctx.font='800 '+Math.round(r*1.3)+'px -apple-system,Arial,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(String(p.num||''),bx,by+1);
      });
      var out=cv, maxW=1400;
      if (cv.width>maxW){ var sc=maxW/cv.width; var c2=document.createElement('canvas'); c2.width=Math.round(cv.width*sc); c2.height=Math.round(cv.height*sc); c2.getContext('2d').drawImage(cv,0,0,c2.width,c2.height); out=c2; }
      var img=null; try{ img=out.toDataURL('image/jpeg',0.7); }catch(e){}
      resolve(img);
    }
    if (state.bg){ var im=new Image(); im.onload=function(){draw(im);}; im.onerror=function(){draw(null);}; im.src=state.bg; }
    else draw(null);
  });
}
function savePlan(){
  try { localStorage.setItem(storeKey(), JSON.stringify(state)); }
  catch(e){ toast('Stockage plein — réduis la taille du plan'); return; }
  function persistMeta(image){
    if (!DECOR_ID) return;
    try {
      const st=readCanal7();
      if (st && Array.isArray(st.d2Items)) {
        const d=st.d2Items.find(function(x){ return String(x.id)===String(DECOR_ID); });
        if (d){ if(!d.modules)d.modules={}; if(!d.modules.instal)d.modules.instal={};
          d.modules.instal.planFeux={ count:state.pins.length, updatedAt:Date.now(), image: image||null };
          // Stocke l'image du plan comme photo du module (visible dans le détail du décor ET l'export TODAY).
          if(!Array.isArray(d.modules.instal.photos)) d.modules.instal.photos=[];
          var idx=d.modules.instal.photos.findIndex(function(x){ return x && x.plan; });
          if (image){ var entry={ url:image, name:'Plan de feux', plan:true }; if(idx>=0) d.modules.instal.photos[idx]=entry; else d.modules.instal.photos.push(entry); }
          else if (idx>=0) d.modules.instal.photos.splice(idx,1);
          localStorage.setItem('ponctuels-state', JSON.stringify(st)); }
      }
    } catch(e){}
  }
  buildCompositeNative().then(function(img){ persistMeta(img); toast('Plan enregistré ✓'); })
    .catch(function(){ persistMeta(null); toast('Plan enregistré ✓'); });
}
function loadPlan(){
  try { const raw=localStorage.getItem(storeKey()); if(raw){ const s=JSON.parse(raw); if(s&&typeof s==='object') state=Object.assign({bg:null,bgW:0,bgH:0,pins:[]},s); } } catch(e){}
  state.pins = (state.pins||[]).map(function(p){ p.symbol=p.symbol||'par'; p.angle=p.angle||0; return p; });
  if (state.bg) showBg(state.bg); else showEmpty();
  renderPins();
}

/* ---------- Import fond ---------- */
function onBgFile(input){ const f=input.files&&input.files[0]; if(!f)return; if(f.type==='application/pdf') importPdf(f); else importImage(f); input.value=''; }
function importImage(file){ const r=new FileReader(); r.onload=function(){ compressToBg(r.result); }; r.readAsDataURL(file); }
function importPdf(file){
  if(!window.pdfjsLib){ toast('Lecteur PDF indisponible (hors-ligne)'); return; }
  const r=new FileReader();
  r.onload=function(){
    const data=new Uint8Array(r.result);
    pdfjsLib.getDocument({data:data}).promise.then(function(pdf){ return pdf.getPage(1); }).then(function(page){
      const vp0=page.getViewport({scale:1}); const scale=Math.min(2200/vp0.width,2.5); const vp=page.getViewport({scale:scale});
      const cv=document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
      return page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise.then(function(){ compressToBg(cv.toDataURL('image/jpeg',0.82)); });
    }).catch(function(){ toast('Impossible de lire ce PDF'); });
  };
  r.readAsArrayBuffer(file);
}
function compressToBg(dataUrl){
  const img=new Image();
  img.onload=function(){
    const maxDim=1700; let w=img.naturalWidth,h=img.naturalHeight; const sc=Math.min(1,maxDim/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
    let out; try{ out=cv.toDataURL('image/jpeg',0.72); }catch(e){ out=dataUrl; }
    state.bg=out; state.bgW=w; state.bgH=h; showBg(out); renderPins(); toast('Plan importé — posez vos projecteurs');
  };
  img.src=dataUrl;
}
function showEmpty(){ document.getElementById('empty').classList.remove('hidden'); document.getElementById('stage').classList.add('hidden'); }
function showBg(src){ document.getElementById('empty').classList.add('hidden'); document.getElementById('stage').classList.remove('hidden'); document.getElementById('bg-img').src=src; }

/* ---------- Ajout + pose ---------- */
let addMode=false;
function toggleAddMode(){ if(!state.bg){ toast('Importez d’abord un plan'); return; } addMode=!addMode; document.getElementById('add-btn').classList.toggle('on',addMode); document.getElementById('hint').classList.toggle('hidden',!addMode); if(addMode) deselect(); }
document.getElementById('stage').addEventListener('click', function(ev){
  if(addMode){
    if(ev.target.closest('.pin')) return;
    const rect=document.getElementById('bg-img').getBoundingClientRect();
    const x=(ev.clientX-rect.left)/rect.width, y=(ev.clientY-rect.top)/rect.height;
    if(x<0||x>1||y<0||y>1) return;
    addPin(x,y); addMode=false; document.getElementById('add-btn').classList.remove('on'); document.getElementById('hint').classList.add('hidden');
  } else {
    if(!ev.target.closest('.pin')) deselect();
  }
});
function nextNum(){ let m=0; state.pins.forEach(function(p){ const n=parseInt(p.num,10); if(!isNaN(n)&&n>m)m=n; }); return String(m+1); }
function addPin(x,y){ const p={ id:'p'+Date.now()+Math.floor(Math.random()*999), x:x, y:y, num:nextNum(), symbol:'par', angle:0, type:'', pow:'', seq:'', color:'#7c3aed' }; state.pins.push(p); selId=p.id; renderPins(); openSheet(p.id); }

function renderPins(){
  const stage=document.getElementById('stage');
  [...stage.querySelectorAll('.pin')].forEach(function(el){ el.remove(); });
  state.pins.forEach(function(p){
    const el=document.createElement('div');
    el.className='pin'+(p.id===selId?' sel':''); el.dataset.id=p.id;
    el.style.left=(p.x*100)+'%'; el.style.top=(p.y*100)+'%';
    let html='<div class="pin-rot" style="transform:rotate('+(p.angle||0)+'deg)">'+symbolSvg(p.symbol,p.color,44)+'</div>';
    html+='<div class="pin-num" style="background:'+p.color+';color:'+contrast(p.color)+'">'+esc(p.num||'')+'</div>';
    if(p.id===selId){ html+='<div class="pin-handle" style="transform:rotate('+(p.angle||0)+'deg)"><span class="pin-handle-line"></span><span class="pin-handle-knob">&#8635;</span></div>'; }
    el.innerHTML=html;
    attachDrag(el,p);
    if(p.id===selId){ const knob=el.querySelector('.pin-handle-knob'); if(knob) attachRotate(knob, el, p); }
    stage.appendChild(el);
  });
  updateChip();
}
function attachDrag(el,p){
  let sx=0,sy=0,moved=false,dragging=false;
  el.addEventListener('pointerdown',function(ev){
    if(ev.target.closest('.pin-handle')) return; // rotation gérée à part
    ev.stopPropagation(); dragging=true; moved=false; sx=ev.clientX; sy=ev.clientY;
    try{ el.setPointerCapture(ev.pointerId); }catch(e){} el.style.cursor='grabbing';
  });
  el.addEventListener('pointermove',function(ev){
    if(!dragging) return;
    if(Math.abs(ev.clientX-sx)>4||Math.abs(ev.clientY-sy)>4) moved=true;
    const rect=document.getElementById('bg-img').getBoundingClientRect();
    let x=(ev.clientX-rect.left)/rect.width, y=(ev.clientY-rect.top)/rect.height;
    x=Math.max(0,Math.min(1,x)); y=Math.max(0,Math.min(1,y));
    p.x=x; p.y=y; el.style.left=(x*100)+'%'; el.style.top=(y*100)+'%';
  });
  el.addEventListener('pointerup',function(ev){
    dragging=false; el.style.cursor='grab';
    if(!moved){ if(selId!==p.id){ selId=p.id; renderPins(); } else { updateChip(); } }
  });
}
function attachRotate(knob, pinEl, p){
  let rotating=false;
  knob.addEventListener('pointerdown',function(ev){ ev.stopPropagation(); rotating=true; try{ knob.setPointerCapture(ev.pointerId); }catch(e){} });
  knob.addEventListener('pointermove',function(ev){
    if(!rotating) return;
    const rect=pinEl.getBoundingClientRect(); const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    let ang=Math.atan2(ev.clientX-cx, -(ev.clientY-cy))*180/Math.PI; if(ang<0)ang+=360; ang=Math.round(ang);
    p.angle=ang;
    const r=pinEl.querySelector('.pin-rot'); if(r) r.style.transform='rotate('+ang+'deg)';
    const h=pinEl.querySelector('.pin-handle'); if(h) h.style.transform='rotate('+ang+'deg)';
    const av=document.getElementById('angle-val'); if(av && document.getElementById('sheet-ov').classList.contains('open')) av.textContent=ang+'°';
  });
  knob.addEventListener('pointerup',function(ev){ rotating=false; });
}
function deselect(){ selId=null; renderPins(); }

/* ---------- Chip éditer ---------- */
function updateChip(){ const chip=document.getElementById('edit-chip'); const show=selId && !document.getElementById('sheet-ov').classList.contains('open') && !addMode; chip.classList.toggle('show',!!show); }
function editSelected(){ if(selId) openSheet(selId); }

/* ---------- Sheet ---------- */
function curPin(){ return state.pins.find(function(x){ return x.id===selId; }); }
function openSheet(id){
  const p=state.pins.find(function(x){ return x.id===id; }); if(!p) return; selId=id; renderPins();
  // symboles
  const sr=document.getElementById('symrow');
  sr.innerHTML=SYMBOL_LIST.map(function(it){ return '<div class="symbtn'+(p.symbol===it[0]?' sel':'')+'" data-s="'+it[0]+'" title="'+it[1]+'">'+symbolSvg(it[0],'#444',38)+'</div>'; }).join('');
  [...sr.children].forEach(function(b){ b.onclick=function(){ p.symbol=b.dataset.s; [...sr.children].forEach(function(x){x.classList.remove('sel');}); b.classList.add('sel'); renderPins(); }; });
  document.getElementById('angle-val').textContent=(p.angle||0)+'°';
  document.getElementById('f-num').value=p.num||'';
  document.getElementById('f-type').value=p.type||'';
  document.getElementById('f-pow').value=p.pow||'';
  const sel=document.getElementById('f-seq'); let opts='<option value="">—</option>';
  DECOR_SEQS.forEach(function(s){ const lbl=seqLabel(s); if(lbl) opts+='<option value="'+esc(lbl)+'"'+(p.seq===lbl?' selected':'')+'>'+esc(lbl)+'</option>'; });
  if(p.seq && !DECOR_SEQS.some(function(s){ return seqLabel(s)===p.seq; })) opts+='<option value="'+esc(p.seq)+'" selected>'+esc(p.seq)+'</option>';
  sel.innerHTML=opts;
  const cr=document.getElementById('colorrow');
  cr.innerHTML=PALETTE.map(function(c){ return '<div class="sw'+(p.color===c?' sel':'')+'" data-c="'+c+'" style="background:'+c+'"></div>'; }).join('');
  [...cr.children].forEach(function(sw){ sw.onclick=function(){ [...cr.children].forEach(function(s){s.classList.remove('sel');}); sw.classList.add('sel'); p.color=sw.dataset.c; renderPins(); }; });
  // live bind text fields
  document.getElementById('f-num').oninput=function(){ p.num=this.value.trim(); renderPins(); };
  document.getElementById('f-type').oninput=function(){ p.type=this.value.trim(); };
  document.getElementById('f-pow').oninput=function(){ p.pow=this.value.trim(); };
  sel.onchange=function(){ p.seq=this.value; };
  document.getElementById('sheet-ov').classList.add('open'); updateChip();
}
function nudgeAngle(d){ const p=curPin(); if(!p) return; let a=((p.angle||0)+d)%360; if(a<0)a+=360; p.angle=a; document.getElementById('angle-val').textContent=a+'°'; renderPins(); }
function closeSheet(){ document.getElementById('sheet-ov').classList.remove('open'); renderPins(); updateChip(); }
function deletePin(){ state.pins=state.pins.filter(function(x){ return x.id!==selId; }); selId=null; document.getElementById('sheet-ov').classList.remove('open'); renderPins(); }

/* ---------- Légende ---------- */
function openLegend(){
  const body=document.getElementById('legend-body');
  if(!state.pins.length){ body.innerHTML='<div class="leg-empty">Aucun projecteur posé.</div>'; }
  else {
    const sorted=state.pins.slice().sort(function(a,b){ return (parseInt(a.num,10)||0)-(parseInt(b.num,10)||0); });
    body.innerHTML=sorted.map(function(p){
      const parts=[]; if(p.type)parts.push(esc(p.type)); if(p.pow)parts.push(esc(p.pow)); if(p.seq)parts.push('Séq '+esc(p.seq));
      const symName=(SYMBOL_LIST.find(function(it){return it[0]===p.symbol;})||['','Projecteur'])[1];
      return '<div class="leg-item"><div class="leg-sym">'+symbolSvg(p.symbol,p.color,34)
        +'<div class="leg-num" style="background:'+p.color+';color:'+contrast(p.color)+'">'+esc(p.num||'')+'</div></div>'
        +'<div class="leg-txt"><div class="a">'+(esc(p.type)||symName)+'</div><div class="b">'+(parts.join(' · ')||'—')+'</div></div></div>';
    }).join('');
  }
  document.getElementById('legend').classList.add('open');
}
function closeLegend(){ document.getElementById('legend').classList.remove('open'); }

/* ---------- Export ---------- */
function openExportMenu(ev){ const m=document.getElementById('export-menu'); if(!state.bg){ toast('Importez d’abord un plan'); return; } const r=ev.currentTarget.getBoundingClientRect(); m.style.top=(r.bottom+6)+'px'; m.style.left=Math.max(8,r.right-175)+'px'; m.classList.add('open'); }
document.addEventListener('click',function(ev){ const m=document.getElementById('export-menu'); if(m.classList.contains('open') && !m.contains(ev.target) && !ev.target.closest('.tb-btn')) m.classList.remove('open'); });
function loadImg(src){ return new Promise(function(res,rej){ const i=new Image(); i.onload=function(){res(i);}; i.onerror=rej; i.src=src; }); }
function buildComposite(){
  return loadImg(state.bg).then(function(bg){
    const W=bg.naturalWidth,H=bg.naturalHeight; const cv=document.createElement('canvas'); cv.width=W; cv.height=H; const ctx=cv.getContext('2d');
    ctx.drawImage(bg,0,0,W,H);
    const size=Math.max(36,Math.round(Math.min(W,H)*0.07));
    let chain=Promise.resolve();
    state.pins.forEach(function(p){
      chain=chain.then(function(){ return loadImg(symbolDataUrl(p.symbol,p.color,96)); }).then(function(im){
        const cx=p.x*W, cy=p.y*H;
        ctx.save(); ctx.translate(cx,cy); ctx.rotate((p.angle||0)*Math.PI/180); ctx.drawImage(im,-size/2,-size/2,size,size); ctx.restore();
        const r=size*0.2, bx=cx+size*0.30, by=cy+size*0.30;
        ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill();
        ctx.lineWidth=Math.max(1.5,r*0.18); ctx.strokeStyle='#fff'; ctx.stroke();
        ctx.fillStyle=contrast(p.color); ctx.font='800 '+Math.round(r*1.2)+'px -apple-system,Arial,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(p.num||'', bx, by+1);
      });
    });
    return chain.then(function(){ return cv; });
  });
}
function exportPNG(){
  document.getElementById('export-menu').classList.remove('open');
  buildComposite().then(function(cv){ const a=document.createElement('a'); a.href=cv.toDataURL('image/png'); a.download='plan-de-feux'+(DECOR_NAME?('-'+slug(DECOR_NAME)):'')+'.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a); toast('PNG exporté'); });
}
function exportPDF(){
  document.getElementById('export-menu').classList.remove('open');
  const ns=window.jspdf||window.jsPDF; const JsPDF=ns?(ns.jsPDF||ns):null; if(!JsPDF){ toast('Export PDF indisponible'); return; }
  buildComposite().then(function(cv){
    const landscape=cv.width>=cv.height; const doc=new JsPDF({orientation:landscape?'landscape':'portrait',unit:'mm',format:'a4'});
    const pw=doc.internal.pageSize.getWidth(), ph=doc.internal.pageSize.getHeight(), margin=10;
    doc.setFontSize(13); doc.setTextColor(124,58,237); doc.setFont(undefined,'bold'); doc.text('Plan de feux'+(DECOR_NAME?(' — '+DECOR_NAME):''),margin,margin);
    const top=margin+6, availW=pw-margin*2, availH=ph-top-margin, ratio=cv.width/cv.height;
    let iw=availW, ih=iw/ratio; if(ih>availH){ ih=availH; iw=ih*ratio; } const ix=margin+(availW-iw)/2;
    doc.addImage(cv.toDataURL('image/jpeg',0.85),'JPEG',ix,top,iw,ih);
    if(state.pins.length){
      doc.addPage(); doc.setFontSize(13); doc.setTextColor(124,58,237); doc.setFont(undefined,'bold'); doc.text('Légende',margin,margin);
      let y=margin+8; const sorted=state.pins.slice().sort(function(a,b){ return (parseInt(a.num,10)||0)-(parseInt(b.num,10)||0); }); doc.setFontSize(10);
      sorted.forEach(function(p){
        if(y>ph-margin){ doc.addPage(); y=margin; }
        const rgb=hexRgb(p.color); doc.setFillColor(rgb[0],rgb[1],rgb[2]); doc.circle(margin+3,y-1.2,3,'F');
        doc.setTextColor(p.color==='#ffffff'?80:255); doc.setFont(undefined,'bold'); doc.text(String(p.num||''),margin+3,y,{align:'center',baseline:'middle'});
        doc.setTextColor(30); doc.setFont(undefined,'normal');
        const bits=[]; if(p.type)bits.push(p.type); if(p.pow)bits.push(p.pow); if(p.seq)bits.push('Séq '+p.seq);
        const symName=(SYMBOL_LIST.find(function(it){return it[0]===p.symbol;})||['','Projecteur'])[1];
        doc.text((p.type?p.type:symName)+(bits.length?('  —  '+bits.join(' · ')):''),margin+9,y); y+=7;
      });
    }
    doc.save('plan-de-feux'+(DECOR_NAME?('-'+slug(DECOR_NAME)):'')+'.pdf'); toast('PDF exporté');
  });
}

/* ---------- utils ---------- */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function hexRgb(h){ h=h.replace('#',''); if(h.length===3) h=h.split('').map(function(c){return c+c;}).join(''); return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)]; }
function contrast(hex){ const c=hexRgb(hex); const l=(0.299*c[0]+0.587*c[1]+0.114*c[2])/255; return l>0.6?'#111':'#fff'; }
function goBack(){ if(history.length>1) history.back(); else location.href='index.html'; }
let _tt=null; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(function(){ t.classList.remove('show'); },1800); }

initContext(); loadPlan();
